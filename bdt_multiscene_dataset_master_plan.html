<p>Every multi-note image is placed in a folder named by its total monetary value. The folder name IS the ground truth. This allows any system (yours or future researchers') to evaluate transaction-value accuracy, not just detection accuracy. This is a contribution that no existing dataset has.</p>

<h3>Annotation schema — the exact standard to follow</h3>

<h3>Format: YOLO v8/v11 (normalised bounding box)</h3>
<p>Each image <code>IMG_00123.jpg</code> has a matching <code>IMG_00123.txt</code> file in the labels folder.</p>
<p>Each line in the .txt file = one note in the image:</p>
<div class="folder">
class_id  x_center  y_center  width  height<br><br>

<h3>Ground truth metadata file — per image</h3>
<p>Each image also gets a row in a master <code>metadata.csv</code> file:</p>
<div class="folder">
image_id, notes_in_scene, denominations, sum_bdt, condition, environment, lighting, annotator<br>
IMG_00123, 3, "100,50,20", 170, crumpled, desk, indoor_fluorescent, junior_A
</div>

<h3>Quality rules for annotators (give to juniors)</h3>
<ol>
<li>Draw box as tight as possible — include all visible edges of the note, no excess margin</li>
<li>For partially visible notes: annotate if at least 40% of the note is visible. Skip if less.</li>
<li>For folded notes: annotate the visible folded area as one box</li>
<li>For overlapping notes: each note gets its own box — they WILL overlap in the annotation file, that is correct</li>
<li>Every box must be labelled — never leave an unlabelled box</li>
<li>After annotating, double-check: count boxes in label file = count notes in image</li>
<li>If unsure of denomination: open metadata.csv, confirm with the shooting log</li>
</ol>

<div class="warn"><strong>Annotation quality check:</strong> After every 200 images, a second annotator reviews 10 random images. If more than 1 error found in 10 → re-annotate that batch. Record inter-annotator agreement rate (target: >95%). This number goes in your Data in Brief paper as evidence of quality.</div>
